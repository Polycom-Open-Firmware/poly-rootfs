# TC8 kiosk compositor config. kiosk-shell fullscreens the single client
# (the browser launched by kiosk-launch). The DSI panel is portrait-native
# (800x1280, mxsfb/card1) and mounted for landscape use; transform rotates
# the output to match. Starting point = 90 (equivalent to the old `cage -r`);
# tune live if orientation is off (valid: normal, 90, 180, 270, flipped*).
[core]
shell=kiosk-shell.so
require-input=false
idle-time=0
xwayland=false

[output]
name=DSI-1
transform=rotate-90

[libinput]
enable-tap=true
